apiVersion: v1
kind: Service
metadata:
  name: phronosis-api-svc
  namespace: phronosis
spec:
  type: NodePort
  selector:
    app: phronosis-api
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  # Preserve real client IP so sessionAffinity: ClientIP actually works.
  # Without this, NodePort SNAT's all traffic to the node IP, making all
  # clients look identical and defeating session pinning.
  externalTrafficPolicy: Local
  ports:
    - port: 3004
      targetPort: 3004
      nodePort: 30040
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phronosis-api
  namespace: phronosis
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: phronosis-api
  template:
    metadata:
      labels:
        app: phronosis-api
    spec:
      containers:
        - name: phronosis-api
          image: ghcr.io/coleflicek/phronosis:latest  # updated by CI
          ports:
            - containerPort: 3004
          envFrom:
            - secretRef:
                name: phronosis-secrets
            - configMapRef:
                name: phronosis-config
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
