apiVersion: apps/v1
kind: Deployment
metadata:
  name: scopenos-worker
  namespace: scopenos
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: scopenos-worker
  template:
    metadata:
      labels:
        app: scopenos-worker
    spec:
      containers:
        - name: scopenos-worker
          image: ghcr.io/coleflicek/scopenos:latest  # same image as API
          command: ["python", "-m", "src.worker"]
          envFrom:
            - secretRef:
                name: scopenos-secrets
            - configMapRef:
                name: scopenos-config
          resources:
            requests:
              memory: "512Mi"   # indexing is memory-hungry
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
