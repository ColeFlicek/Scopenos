# TLS/cert-manager disabled for home server deployment.
# To enable HTTPS on a public cluster:
#   1. Install cert-manager
#   2. Uncomment the tls section and cert-manager annotation
#   3. Add the ClusterIssuer back (see git history)
#
# ingressClassName must match what is installed on the cluster.
# K3s ships with Traefik; switch to nginx if you install NGINX Ingress instead.
#
# No host rule: Traefik on port 3004 forwards all traffic to Phronosis regardless
# of Host header. The MCP client connects via Tailscale IP, not a DNS hostname,
# so host-based routing would block it.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phronosis-ingress
  namespace: phronosis
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: phronosis-api-svc
                port:
                  number: 3004
