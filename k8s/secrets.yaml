# Secret values are base64-encoded. Generate with:
#   echo -n "your-value" | base64
#
# Never commit real values. Fill in before applying:
#   kubectl apply -f k8s/secrets.yaml -n phronosis
#
# Or use a sealed-secrets controller / external-secrets operator for GitOps.
apiVersion: v1
kind: Secret
metadata:
  name: phronosis-secrets
  namespace: phronosis
type: Opaque
data:
  # echo -n "postgresql://phronosis:PASSWORD@postgres-svc/phronosis" | base64
  DATABASE_URL: ""
  # echo -n "redis://redis-svc:6379" | base64
  REDIS_URL: ""
  # echo -n "sk-ant-api03-..." | base64
  ANTHROPIC_API_KEY: ""
  # echo -n "sk-proj-..." | base64
  OPENAI_API_KEY: ""
  # echo -n "re_..." | base64
  RESEND_API_KEY: ""
