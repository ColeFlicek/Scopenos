# Self-hosted Postgres with pgvector for development / small deployments.
# For production, prefer a managed database (Hetzner Managed DB or DO Managed Postgres)
# and remove this file — just update DATABASE_URL in secrets.yaml.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: scopenos
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: scopenos
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: scopenos
spec:
  serviceName: postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg17
          args:
            - "-c"
            - "max_connections=50"
            - "-c"
            - "shared_buffers=256MB"
            - "-c"
            - "work_mem=8MB"
            - "-c"
            - "maintenance_work_mem=64MB"
          env:
            - name: POSTGRES_USER
              value: scopenos
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scopenos-secrets
                  key: POSTGRES_PASSWORD
                  optional: true
            - name: POSTGRES_DB
              value: scopenos
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: schema
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: schema
          configMap:
            name: postgres-schema
---
# Mount schema.sql as a ConfigMap so Postgres initialises it on first start.
# Apply after running: kubectl create configmap postgres-schema --from-file=schema.sql -n scopenos
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-schema
  namespace: scopenos
# data is populated by k8s/README.md setup command:
#   kubectl create configmap postgres-schema \
#     --from-file=00-init.sql=k8s/postgres-init.sql \
#     --from-file=01-schema.sql=schema.sql \
#     -n scopenos --dry-run=client -o yaml | kubectl apply -f -
# Files are applied alphabetically — 00-init.sql runs before 01-schema.sql.
