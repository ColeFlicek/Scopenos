<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- Left leg of A (bottom-left to apex) -->
  <line x1="11" y1="53" x2="32" y2="11" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
  <!-- Right leg of A (apex to bottom-right) -->
  <line x1="32" y1="11" x2="53" y2="53" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="19" y1="38" x2="45" y2="38" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <!-- Apex node (brightest — draws the eye) -->
  <circle cx="32" cy="11" r="5" fill="#7dd3fc"/>
  <!-- Crossbar nodes -->
  <circle cx="19" cy="38" r="3.5" fill="#0ea5e9"/>
  <circle cx="45" cy="38" r="3.5" fill="#0ea5e9"/>
  <!-- Base nodes -->
  <circle cx="11" cy="53" r="3.5" fill="#0ea5e9"/>
  <circle cx="53" cy="53" r="3.5" fill="#0ea5e9"/>
</svg>
