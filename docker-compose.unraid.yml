# Unraid override — stores persistent data in /mnt/user/appdata/acip/
# so it survives array stops and shows up in the Unraid Docker UI.
#
# Applied automatically by deploy.sh.
# To apply manually:
#   docker compose -f docker-compose.yml -f docker-compose.unraid.yml up -d

services:
  neo4j:
    volumes:
      - /mnt/user/appdata/acip/neo4j:/data

  acip:
    volumes:
      - /mnt/user/appdata/acip/sqlite:/data
    # Allows the container to reach Ollama running on the Unraid host
    extra_hosts:
      - "host.docker.internal:host-gateway"
