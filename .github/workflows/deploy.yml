name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip tests (faster deploy)"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: coleflicek/phronosis

jobs:
  test:
    if: ${{ !inputs.skip_tests }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: phronosis
          POSTGRES_PASSWORD: phronosis
          POSTGRES_DB: phronosis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y libpq-dev postgresql-client

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Setup database
        run: |
          PGPASSWORD=phronosis psql -U phronosis -h localhost -d phronosis_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"
          PGPASSWORD=phronosis psql -U phronosis -h localhost -d phronosis_test -f schema.sql

      - name: Run tests
        run: pytest tests/ -q
        env:
          DATABASE_URL: postgresql://phronosis:phronosis@localhost/phronosis_test
          REDIS_URL: redis://localhost:6379/1

  build-and-push:
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      # ── Preflight: fail immediately if required secrets are missing ────────
      - name: Validate required secrets
        run: |
          missing=""
          [ -z "$DATABASE_URL" ]        && missing="$missing DATABASE_URL"
          [ -z "$OPENAI_API_KEY" ]      && missing="$missing OPENAI_API_KEY"
          [ -z "$ANTHROPIC_API_KEY" ]   && missing="$missing ANTHROPIC_API_KEY"
          [ -z "$TS_OAUTH_CLIENT_ID" ]  && missing="$missing TS_OAUTH_CLIENT_ID"
          [ -z "$TS_OAUTH_SECRET" ]     && missing="$missing TS_OAUTH_SECRET"
          if [ -n "$missing" ]; then
            echo "ERROR: Missing required secrets:$missing"
            echo "Set them in Settings → Secrets → Actions before deploying."
            exit 1
          fi
          echo "All required secrets present."
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      # ── Namespace first ────────────────────────────────────────────────────
      - name: Create namespace
        run: kubectl apply -f k8s/namespace.yaml

      # ── CoreDNS — patch to use reliable upstream ───────────────────────────
      - name: Patch CoreDNS upstream
        run: |
          kubectl -n kube-system get configmap coredns -o json \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          current = d['data']['Corefile']
          patched = current.replace('forward . /etc/resolv.conf', 'forward . 8.8.8.8 8.8.4.4')
          d['data']['Corefile'] = patched
          print(json.dumps(d))" \
            | kubectl apply -f -
          kubectl rollout restart deployment/coredns -n kube-system
          kubectl rollout status deployment/coredns -n kube-system --timeout=60s

      # ── ConfigMaps ─────────────────────────────────────────────────────────
      - name: Apply ConfigMaps
        run: kubectl apply -f k8s/configmap.yaml

      # ── Secrets ───────────────────────────────────────────────────────────
      # Required secrets (set in repo Settings → Secrets → Actions):
      #   DATABASE_URL        - full postgres DSN (external DB, not in-cluster)
      #                         TheHive: postgresql://phronosis:<pw>@<docker-bridge-gw>/phronosis
      #                         % in passwords must be encoded as %25 in the URL
      #   OPENAI_API_KEY      - for embeddings
      #   ANTHROPIC_API_KEY   - for LLM enrichment
      #   RESEND_API_KEY      - for email (optional)
      #   KUBECONFIG          - base64-encoded kubeconfig for the cluster
      - name: Apply secrets
        run: |
          kubectl create secret generic phronosis-secrets \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=REDIS_URL="redis://redis-svc.phronosis.svc.cluster.local:6379" \
            --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --from-literal=ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --from-literal=RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            -n phronosis --dry-run=client -o yaml | kubectl apply -f -

      # ── Redis ─────────────────────────────────────────────────────────────
      - name: Deploy Redis
        run: kubectl apply -f k8s/redis.yaml

      # ── API + Worker ───────────────────────────────────────────────────────
      - name: Deploy API and Worker
        run: |
          IMAGE="ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          sed -i "s|ghcr.io/${{ env.IMAGE_NAME }}:latest|${IMAGE}|g" \
            k8s/api-deployment.yaml k8s/worker-deployment.yaml
          kubectl apply -f k8s/api-deployment.yaml
          kubectl apply -f k8s/worker-deployment.yaml

      # ── Ingress + autoscalers ──────────────────────────────────────────────
      - name: Apply Ingress and HPAs
        run: |
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa-api.yaml

      # ── Wait for rollout — dump logs on failure so you can see WHY ─────────
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/phronosis-api -n phronosis --timeout=5m
          kubectl rollout status deployment/phronosis-worker -n phronosis --timeout=5m

      - name: Dump pod logs on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n phronosis -o wide
          echo ""
          echo "=== API pod logs (last 100 lines) ==="
          kubectl logs -l app=phronosis-api -n phronosis --tail=100 --prefix || true
          echo ""
          echo "=== Worker pod logs (last 50 lines) ==="
          kubectl logs -l app=phronosis-worker -n phronosis --tail=50 --prefix || true
          echo ""
          echo "=== Events (last 20) ==="
          kubectl get events -n phronosis --sort-by='.lastTimestamp' | tail -20
