name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/acip

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: acip
          POSTGRES_PASSWORD: acip
          POSTGRES_DB: acip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y libpq-dev postgresql-client

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Setup database
        run: |
          PGPASSWORD=acip psql -U acip -h localhost -d acip_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"
          PGPASSWORD=acip psql -U acip -h localhost -d acip_test -f schema.sql

      - name: Run tests
        run: pytest tests/ -q
        env:
          DATABASE_URL: postgresql://acip:acip@localhost/acip_test
          REDIS_URL: redis://localhost:6379/1

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      # ── Namespace first ────────────────────────────────────────────────────
      - name: Create namespace
        run: kubectl apply -f k8s/namespace.yaml

      # ── ConfigMaps ─────────────────────────────────────────────────────────
      - name: Apply ConfigMaps
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl create configmap postgres-schema \
            --from-file=00-init.sql=k8s/postgres-init.sql \
            --from-file=01-schema.sql=schema.sql \
            -n acip --dry-run=client -o yaml | kubectl apply -f -

      # ── Secrets from GitHub Actions secrets ───────────────────────────────
      # Required secrets (set in repo Settings → Secrets → Actions):
      #   KUBECONFIG          - base64-encoded kubeconfig for your home server
      #   POSTGRES_PASSWORD   - password for the in-cluster Postgres
      #   OPENAI_API_KEY      - for embeddings
      #   ANTHROPIC_API_KEY   - for LLM enrichment
      #   RESEND_API_KEY      - for email (optional, leave blank to disable)
      #
      # DATABASE_URL and REDIS_URL are derived from in-cluster service names:
      #   postgresql://acip:<POSTGRES_PASSWORD>@postgres-svc.acip.svc.cluster.local/acip
      #   redis://redis-svc.acip.svc.cluster.local:6379
      - name: Apply secrets
        run: |
          kubectl create secret generic acip-secrets \
            --from-literal=DATABASE_URL="postgresql://acip:${{ secrets.POSTGRES_PASSWORD }}@postgres-svc.acip.svc.cluster.local/acip" \
            --from-literal=REDIS_URL="redis://redis-svc.acip.svc.cluster.local:6379" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --from-literal=ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --from-literal=RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            -n acip --dry-run=client -o yaml | kubectl apply -f -

      # ── Postgres (StatefulSet — wait for ready before API starts) ─────────
      - name: Deploy Postgres
        run: kubectl apply -f k8s/postgres.yaml

      - name: Wait for Postgres
        run: kubectl rollout status statefulset/postgres -n acip --timeout=3m

      # ── Redis ──────────────────────────────────────────────────────────────
      - name: Deploy Redis
        run: kubectl apply -f k8s/redis.yaml

      # ── API + Worker (pinned to the commit SHA image) ──────────────────────
      - name: Deploy API and Worker
        run: |
          IMAGE="ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          sed -i "s|ghcr.io/${{ env.IMAGE_NAME }}:latest|${IMAGE}|g" \
            k8s/api-deployment.yaml k8s/worker-deployment.yaml
          kubectl apply -f k8s/api-deployment.yaml
          kubectl apply -f k8s/worker-deployment.yaml

      # ── Ingress + autoscalers ──────────────────────────────────────────────
      - name: Apply Ingress and HPAs
        run: |
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa-api.yaml
          kubectl apply -f k8s/hpa-worker.yaml

      # ── Wait for both deployments to become healthy ────────────────────────
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/acip-api -n acip --timeout=5m
          kubectl rollout status deployment/acip-worker -n acip --timeout=5m
