name: Build and Deploy (Beta)

on:
  push:
    branches: [beta]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: coleflicek/scopenos

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:beta
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:beta-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          missing=""
          [ -z "$CONTROL_DB_URL" ]      && missing="$missing CONTROL_DB_URL"
          [ -z "$OPENAI_API_KEY" ]      && missing="$missing OPENAI_API_KEY"
          [ -z "$ANTHROPIC_API_KEY" ]   && missing="$missing ANTHROPIC_API_KEY"
          [ -z "$TS_OAUTH_CLIENT_ID" ]  && missing="$missing TS_OAUTH_CLIENT_ID"
          [ -z "$TS_OAUTH_SECRET" ]     && missing="$missing TS_OAUTH_SECRET"
          if [ -n "$missing" ]; then
            echo "ERROR: Missing required secrets:$missing"
            exit 1
          fi
        env:
          CONTROL_DB_URL: ${{ secrets.CONTROL_DB_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      # Copy manifests and patch for beta: namespace, NodePort, Redis URL.
      # Resource names stay the same — no collision across namespaces.
      # Ingress is skipped: beta is accessed directly via NodePort 30050,
      # not through Traefik. Production keeps port 3004 via Traefik untouched.
      - name: Prepare beta manifests
        run: |
          cp -r k8s /tmp/k8s-beta
          # Namespace
          find /tmp/k8s-beta -name "*.yaml" -exec \
            sed -i 's/namespace: scopenos$/namespace: scopenos-beta/g' {} +
          # NodePort: 30040 → 30050
          sed -i 's/nodePort: 30040/nodePort: 30050/' /tmp/k8s-beta/api-deployment.yaml
          # Service port label (external-facing, matches NodePort host access)
          sed -i '/nodePort: 30050/{n;s/port: 3004/port: 3004/}' \
            /tmp/k8s-beta/api-deployment.yaml  # port stays 3004, only nodePort changes
          # Redis cross-namespace URL
          # (patched in secrets step directly — no yaml file change needed)

      - name: Create beta namespace
        run: |
          kubectl create namespace scopenos-beta --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply ConfigMaps
        run: kubectl apply -f /tmp/k8s-beta/configmap.yaml

      - name: Apply secrets
        run: |
          kubectl create secret generic scopenos-secrets \
            --from-literal=CONTROL_DB_URL="${{ secrets.CONTROL_DB_URL }}" \
            --from-literal=PROVISIONER_DSN="${{ secrets.PROVISIONER_DSN }}" \
            --from-literal=REDIS_URL="redis://redis-svc.scopenos-beta.svc.cluster.local:6379" \
            --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --from-literal=ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --from-literal=RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            -n scopenos-beta --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Redis
        run: kubectl apply -f /tmp/k8s-beta/redis.yaml

      - name: Deploy API and Worker
        run: |
          IMAGE="ghcr.io/${{ env.IMAGE_NAME }}:beta-${{ github.sha }}"
          sed -i "s|ghcr.io/${{ env.IMAGE_NAME }}:latest|${IMAGE}|g" \
            /tmp/k8s-beta/api-deployment.yaml /tmp/k8s-beta/worker-deployment.yaml
          kubectl delete service scopenos-api-svc -n scopenos-beta --ignore-not-found=true
          kubectl apply -f /tmp/k8s-beta/api-deployment.yaml
          kubectl apply -f /tmp/k8s-beta/worker-deployment.yaml

      - name: Apply HPAs
        run: |
          kubectl apply -f /tmp/k8s-beta/hpa-api.yaml
          # hpa-worker.yaml uses KEDA ScaledObject which is not installed in beta.
          # Worker runs at fixed replicas (defined in worker-deployment.yaml).

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/scopenos-api -n scopenos-beta --timeout=10m
          kubectl rollout status deployment/scopenos-worker -n scopenos-beta --timeout=10m

      # Beta bypasses Traefik — NodePort 30050 is the direct entry point.
      # Production port 3004 (via Traefik) is never touched by this workflow.
      - name: Smoke test
        run: |
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
              http://100.71.88.106:30050/api/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Beta smoke test passed."
              exit 0
            fi
            sleep 5
          done
          echo "Beta smoke test failed — rolling back."
          kubectl rollout undo deployment/scopenos-api -n scopenos-beta
          kubectl rollout status deployment/scopenos-api -n scopenos-beta --timeout=3m
          exit 1

      - name: Dump pod logs on failure
        if: failure()
        run: |
          kubectl get pods -n scopenos-beta -o wide
          kubectl logs -l app=scopenos-api -n scopenos-beta --tail=100 --prefix || true
          kubectl logs -l app=scopenos-worker -n scopenos-beta --tail=50 --prefix || true
          kubectl get events -n scopenos-beta --sort-by='.lastTimestamp' | tail -20
